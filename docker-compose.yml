services:
  api:
    build: .
    container_name: ragapi_api
    restart: always
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
  celery_worker:
    build: .
    container_name: ragapi_celery
    restart: always
    command: celery -A app.celery_app worker --loglevel=info
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragapi_db
    restart: always
    environment:
      POSTGRES_USER: vlad
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: ragapi
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: ragapi_redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  uploads_data:
  postgres_data:
  redis_data: