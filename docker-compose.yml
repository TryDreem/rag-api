services:
  api:
    build: .
    container_name: ragapi_api
    restart: always
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: "postgresql+asyncpg://vlad:1234@postgres:5432/ragapi"
      REDIS_URL: "redis://redis:6379"
      SECRET_KEY: "39d15ac86c401a2453b90501407139fe3dd5d21d5a748052c280d4b9e949b777"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragapi_db
    restart: always
    environment:
      POSTGRES_USER: vlad
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: ragapi
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: ragapi_redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: